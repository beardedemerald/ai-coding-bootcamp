<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cards-container">
        <div class="card">
            <div class="card-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/>
                    <path d="M5 19l1 3 1-3 3-1-3-1-1-3-1 3-3 1 3 1z"/>
                </svg>
            </div>
            <h1 class="card-title">Hobby</h1>
            <p class="card-price">Free</p>
            <div class="card-content">
                <p class="includes-text">Includes:</p>
                <ul class="features-list">
                    <li>
                        <span class="checkmark">✓</span>
                        No credit card required
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Limited Agent requests
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Limited Tab completions
                    </li>
                </ul>
            </div>
            <button class="download-button">Download</button>
        </div>
        <div class="card card--pro">
            <div class="card-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7-6.3-4.6L6 21l2.3-7-6-4.6h7.6L12 2z"/>
                </svg>
            </div>
            <h1 class="card-title">Pro</h1>
            <p class="card-price">$20/mo.</p>
            <div class="card-content">
                <p class="includes-text">Everything in Hobby, plus:</p>
                <ul class="features-list">
                    <li>
                        <span class="checkmark">✓</span>
                        Extended limits on Agent
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Unlimited Tab completions
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Background Agents
                    </li>
                    <li>
                        <span class="checkmark">✓</span>
                        Maximum context windows
                    </li>
                </ul>
            </div>
            <button class="download-button">Get Pro</button>
        </div>
    </div>
    <script src="cursor-gradient.js"></script>
</body>
</html>
